# ===================================
# PRODUCTION CONFIGURATION (Render + Neon)
# ===================================
# Activated via SPRING_PROFILES_ACTIVE=prod
spring.application.name=ucm-connect-api

# Server Configuration - Render sets PORT env var
server.port=${PORT:8080}

# ===================================
# DATABASE - Neon PostgreSQL (Serverless)
# ===================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1

# HikariCP Connection Pool (optimized: increased from 5 to 10 after load testing)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# ===================================
# H2 Console - DISABLED
# ===================================
spring.h2.console.enabled=false

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# ===================================
# AWS COGNITO
# ===================================
aws.cognito.enabled=true
aws.cognito.region=${AWS_COGNITO_REGION}
aws.cognito.userPoolId=${AWS_COGNITO_USER_POOL_ID}
aws.cognito.clientId=${AWS_COGNITO_CLIENT_ID}
aws.cognito.clientSecret=${AWS_COGNITO_CLIENT_SECRET}
aws.cognito.jwks-url=https://cognito-idp.${AWS_COGNITO_REGION}.amazonaws.com/${AWS_COGNITO_USER_POOL_ID}/.well-known/jwks.json

# ===================================
# AWS S3
# ===================================
aws.s3.region=${AWS_S3_REGION}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.access.key.id=${AWS_ACCESS_KEY_ID}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY}

# ===================================
# DISCORD
# ===================================
discord.client-id=${DISCORD_CLIENT_ID:}
discord.client-secret=${DISCORD_CLIENT_SECRET:}
discord.redirect-uri=${DISCORD_REDIRECT_URI:https://ucm-connect-api.onrender.com/api/v1/discord/callback}
discord.bot-api-url=${DISCORD_BOT_API_URL:}
app.frontend-url=${FRONTEND_URL:https://team-project-peach.vercel.app}

# ===================================
# CORS - Frontend URL
# ===================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://team-project-peach.vercel.app}

# ===================================
# SWAGGER
# ===================================
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

# ===================================
# CACHE - Caffeine
# ===================================
spring.cache.type=caffeine
spring.cache.cache-names=subjects,subjectById,userById,postById,commentsByPost
spring.cache.caffeine.spec=maximumSize=5000,expireAfterWrite=30m,recordStats

# ===================================
# ACTUATOR
# ===================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.base-path=/actuator

# ===================================
# LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.example.ucmconnectapi=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===================================
# SECURITY
# ===================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# ===================================
# ERROR HANDLING
# ===================================
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never

# ===================================
# COMPRESSION
# ===================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# ===================================
# PERFORMANCE
# ===================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
