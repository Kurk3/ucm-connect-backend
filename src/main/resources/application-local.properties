# ===================================
# LOCAL DEVELOPMENT CONFIGURATION
# ===================================
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# Or in IntelliJ: Edit Configuration -> Active profiles: local
#
# Uses: Local PostgreSQL + AWS Cognito + AWS S3

spring.application.name=ucm-connect-api

# Server Configuration
server.port=8080

# ===================================
# DATABASE - Local PostgreSQL
# ===================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ucmconnect}
spring.datasource.username=${DB_USERNAME:adamkurek}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=1

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===================================
# AWS COGNITO - ENABLED (uses .env)
# ===================================
aws.cognito.enabled=true
aws.cognito.region=${AWS_COGNITO_REGION}
aws.cognito.userPoolId=${AWS_COGNITO_USER_POOL_ID}
aws.cognito.clientId=${AWS_COGNITO_CLIENT_ID}
aws.cognito.clientSecret=${AWS_COGNITO_CLIENT_SECRET}
aws.cognito.jwks-url=https://cognito-idp.${AWS_COGNITO_REGION}.amazonaws.com/${AWS_COGNITO_USER_POOL_ID}/.well-known/jwks.json

# ===================================
# AWS S3 - ENABLED (uses .env)
# ===================================
aws.s3.region=${AWS_S3_REGION}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.access.key.id=${AWS_ACCESS_KEY_ID}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY}

# ===================================
# DISCORD
# ===================================
discord.client-id=${DISCORD_CLIENT_ID:}
discord.client-secret=${DISCORD_CLIENT_SECRET:}
discord.redirect-uri=http://localhost:8080/api/v1/discord/callback
discord.bot-api-url=http://localhost:3500
app.frontend-url=http://localhost:3000

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===================================
# SWAGGER / OPENAPI
# ===================================
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

# ===================================
# CACHE - Caffeine
# ===================================
spring.cache.type=caffeine
spring.cache.cache-names=subjects,subjectById,userById,postById,commentsByPost
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30m

# ===================================
# ACTUATOR
# ===================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
